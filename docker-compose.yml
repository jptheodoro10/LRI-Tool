services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lri
      POSTGRES_PASSWORD: lri
      POSTGRES_DB: lri
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lri -d lri']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://lri:lri@db:5432/lri
      AUTH_MODE: local
      AI_MODE: ${AI_MODE:-mock}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_MINUTES: 240
      INVITE_EXPIRATION_DAYS: 7
      AI_POLL_INTERVAL_SECONDS: 2
      AI_JOB_TIMEOUT_SECONDS: 30
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: 20
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
      - ./exports:/app/exports
    command: ["/scripts/start-backend.sh"]
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://lri:lri@db:5432/lri
      AUTH_MODE: local
      AI_MODE: ${AI_MODE:-mock}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AI_JOB_TIMEOUT_SECONDS: 30
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: 20
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    command: ["/scripts/start-worker.sh"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    depends_on:
      backend:
        condition: service_started

volumes:
  db_data:
